[package]
name = "unrealspeech"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.0"
tempfile = "3.0"
anyhow = "1.0"
atty = "0.2"
futures = "0.3"
rodio = "0.19"
symphonia = { version = "0.5", features = ["all"] }
