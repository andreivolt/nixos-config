[package]
name = "deepgram-tts"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.11", features = ["json", "stream"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.5"
tempfile = "3"
futures = "0.3"
atty = "0.2"
anyhow = "1.0"
pulldown-cmark = "0.9"
textwrap = "0.16"
rodio = "0.17"
tokio-util = { version = "0.7", features = ["codec"] }
indicatif = "0.17"
