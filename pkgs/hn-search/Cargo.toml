[package]
name = "hn-search"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
reqwest = { version = "0.11", features = ["json"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
html-escape = "0.2"
console = "0.15"
anyhow = "1.0"
ammonia = "3.3"
regex = "1.10"
derive_more = "0.99"
