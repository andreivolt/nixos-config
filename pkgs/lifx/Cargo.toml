[package]
name = "lifx"
version = "0.1.0"
edition = "2021"

[dependencies]
lifx-core = "0.4.0"
clap = { version = "4.0", features = ["derive"] }
clap_complete = "4.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
dirs = "5.0"
uuid = { version = "1.0", features = ["v4"] }
colored = "2.0"
dialoguer = { version = "0.11", features = ["fuzzy-select"] }
