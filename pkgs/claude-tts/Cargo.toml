[package]
name = "claude-tts"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
libc = "0.2"
rayon = "1"
regex = "1"
reqwest = { version = "0.12", features = ["blocking", "json"] }
rodio = "0.19"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shellexpand = "3"
